name: Update README with Blog Posts

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://letsprogram.in"
          # Add more feeds comma-separated:
          # "https://dev.to/feed/yshashi,https://medium.com/feed/@yourhandle"
          max_post_count: 5
          readme_path: README.md
          comment_tag_name: BLOG-POST-LIST